name: 'Checkout and Setup'

description: 'Common checkout and git configuration'

inputs:
  token:
    required: true
    description: 'GitHub token'
    default: ${{ github.token }}

  app-slug:
    required: false
    description: 'GitHub App slug (e.g., my-app). If provided, configures git as the app bot instead of default user'
    default: ''

  shallow:
    required: false
    description: 'If true, performs shallow checkout. If false, fetches full history with tags'
    default: 'true'

runs:
  using: 'composite'
  steps:
    - name: Checkout repository (shallow)
      if: ${{ inputs.shallow == 'true' }}
      uses: actions/checkout@v6
      with:
        token: ${{ inputs.token }}

    - name: Checkout repository (full history)
      if: ${{ inputs.shallow == 'false' }}
      uses: actions/checkout@v6
      with:
        token: ${{ inputs.token }}
        fetch-depth: 0
        fetch-tags: true

    - name: Configure git (as an app)
      if: ${{ inputs.app-slug != '' }}
      shell: bash
      run: |
        APP_SLUG="${{ inputs.app-slug }}"
        bot_login="${APP_SLUG}[bot]"
        # URL-encode [] as %5B %5D
        bot_id=$(curl -fsSL "https://api.github.com/users/${APP_SLUG}%5Bbot%5D" | jq -r .id)
        git config --local user.name "$bot_login"
        git config --local user.email "${bot_id}+${bot_login}@users.noreply.github.com"

    - name: Configure git (from token identity)
      if: ${{ inputs.app-slug == '' }}
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
      run: |
        if USER_JSON=$(gh api /user 2>/dev/null); then
          GIT_USER=$(echo "$USER_JSON" | jq -r '.login')
          GIT_ID=$(echo "$USER_JSON" | jq -r '.id')
        elif APP_JSON=$(gh api /app 2>/dev/null); then
          APP_SLUG=$(echo "$APP_JSON" | jq -r '.slug')
          GIT_USER="${APP_SLUG}[bot]"
          if BOT_JSON=$(gh api "/users/${APP_SLUG}%5Bbot%5D" 2>/dev/null); then
            GIT_ID=$(echo "$BOT_JSON" | jq -r '.id')
          else
            GIT_ID=$(echo "$APP_JSON" | jq -r '.id')
          fi
        else
          GIT_USER="github-actions[bot]"
          GIT_ID="41898282"
        fi

        git config --local user.name "$GIT_USER"
        git config --local user.email "${GIT_ID}+${GIT_USER}@users.noreply.github.com"
