name: Update Tags in Documentation

on:
  workflow_run:
    workflows: ["Semantic Versioning and Release"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to update documentation to (e.g., v1.10.2)'
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  update-docs:
    name: Update Documentation Tags
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')

    steps:
      - name: Checkout and setup
        uses: ./checkout-and-setup
        with:
          shallow: 'false'

      - name: Determine tag
        id: get-tag
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          if [ -n "$INPUT_TAG" ]; then
            TAG="$INPUT_TAG"
          else
            git fetch --tags
            TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          fi

          if [ -z "$TAG" ]; then
            echo "::error::No tag found"
            exit 1
          fi

          if [[ ! $TAG =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::notice::Tag '$TAG' is not a full semantic version, skipping"
            exit 0
          fi

          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Sync tags in documentation
        id: sync-tags
        if: steps.get-tag.outputs.tag != ''
        uses: ./sync-tags-in-docs
        with:
          file-extensions: '.md'
          github-repo-path: 'alchemaxinc/composite-toolbox'
          current-tag: ${{ steps.get-tag.outputs.tag }}

      - name: Create Pull Request
        id: create-pr
        if: steps.sync-tags.outputs.files_updated != ''
        uses: ./create-pr
        with:
          token: ${{ github.token }}
          base-branch: 'main'
          branch-prefix: 'update-docs-tags'
          files: ${{ steps.sync-tags.outputs.files_updated }}
          commit-message: 'docs: update action tags to ${{ steps.get-tag.outputs.tag }}'
          pr-title: 'docs: update action tags to ${{ steps.get-tag.outputs.tag }}'
          pr-body: |
            Automatically updates GitHub action tags in documentation files to match the latest release.

            **New tag**: `${{ steps.get-tag.outputs.tag }}`
            **Files updated**: `${{ steps.sync-tags.outputs.files_updated }}`

      - name: Enable auto-merge
        if: steps.create-pr.outputs.pr_number != ''
        uses: ./merge-pr
        with:
          token: ${{ github.token }}
          pull-request-number: ${{ steps.create-pr.outputs.pr_number }}
          merge-method: 'squash'
