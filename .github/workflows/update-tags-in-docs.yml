name: Update Tags in Documentation

on:
  workflow_run:
    workflows: ['Semantic Versioning and Release']
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to update documentation to (e.g., v1.10.2)'
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  update-docs:
    name: Update Documentation Tags
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')

    steps:
      - name: Create temporary GitHub App Token
        id: app
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.HOUSEKEEPING_BOT_APP_ID }}
          private-key: ${{ secrets.HOUSEKEEPING_BOT_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
          token: ${{ steps.app.outputs.token }}

      - name: Configure git identity
        env:
          GH_TOKEN: ${{ steps.app.outputs.token }}
        run: |
          if USER_JSON=$(gh api /user 2>/dev/null); then
            GIT_USER=$(echo "$USER_JSON" | jq -r '.login')
            GIT_ID=$(echo "$USER_JSON" | jq -r '.id')
          elif APP_JSON=$(gh api /app 2>/dev/null); then
            APP_SLUG=$(echo "$APP_JSON" | jq -r '.slug')
            GIT_USER="${APP_SLUG}[bot]"
            if BOT_JSON=$(gh api "/users/${APP_SLUG}%5Bbot%5D" 2>/dev/null); then
              GIT_ID=$(echo "$BOT_JSON" | jq -r '.id')
            else
              GIT_ID=$(echo "$APP_JSON" | jq -r '.id')
            fi
          else
            GIT_USER="github-actions[bot]"
            GIT_ID="41898282"
          fi

          git config --local user.name "$GIT_USER"
          git config --local user.email "${GIT_ID}+${GIT_USER}@users.noreply.github.com"

      - name: Determine tag
        id: get-tag
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          if [ -n "$INPUT_TAG" ]; then
            TAG="$INPUT_TAG"
          else
            git fetch --tags
            TAG=$(git describe --tags --match 'v*.*.*' --abbrev=0 2>/dev/null || echo "")
          fi

          if [ -z "$TAG" ]; then
            echo "::error::No tag found"
            exit 1
          fi

          if [[ ! $TAG =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::notice::Tag '$TAG' is not a full semantic version, skipping"
            exit 0
          fi

          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Sync tags in documentation
        id: sync-tags
        if: steps.get-tag.outputs.tag != ''
        uses: ./sync-tags-in-docs
        with:
          file-extensions: '.md'
          github-repo-path: 'alchemaxinc/composite-toolbox'
          current-tag: ${{ steps.get-tag.outputs.tag }}

      - name: Create Pull Request
        id: create-pr
        if: steps.sync-tags.outputs.files_updated != ''
        uses: ./create-pr
        with:
          token: ${{ steps.app.outputs.token }}
          base-branch: 'main'
          branch-prefix: 'update-docs-tags'
          files: ${{ steps.sync-tags.outputs.files_updated }}
          commit-message: 'docs: update action tags to ${{ steps.get-tag.outputs.tag }}'
          pr-title: 'docs: update action tags to ${{ steps.get-tag.outputs.tag }}'
          pr-body: |
            Automatically updates GitHub action tags in documentation files to match the latest release.

            **New tag**: `${{ steps.get-tag.outputs.tag }}`
            **Files updated**: `${{ steps.sync-tags.outputs.files_updated }}`

      - name: Enable auto-merge
        if: steps.create-pr.outputs.pr_number != ''
        uses: ./merge-pr
        with:
          token: ${{ steps.app.outputs.token }}
          pull-request-number: ${{ steps.create-pr.outputs.pr_number }}
          merge-method: 'squash'
