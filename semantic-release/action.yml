name: 'Semantic Release'

description: 'Run semantic-release with caching and optional backmerge support'

outputs:
  version:
    description: 'The version of the new release (e.g., 1.2.3), empty if no release was made'
    value: ${{ steps.release.outputs.version }}
  tag:
    description: 'The git tag of the new release (e.g., v1.2.3), empty if no release was made'
    value: ${{ steps.release.outputs.tag }}

inputs:
  token:
    required: true
    description: 'GitHub token for authentication'
    default: ${{ github.token }}

  enable-backmerge:
    required: false
    description: 'Enable backmerge from main to develop after release'
    default: 'false'

  backmerge-target-branch:
    required: false
    description: 'Target branch for backmerge (only used when enable-backmerge is true)'
    default: 'develop'

  source-branch:
    required: false
    description: 'Source branch for semantic-release (typically main)'
    default: 'main'

  merge-strategy:
    required: false
    description: "Merge strategy for backmerge. Supported values: 'merge' (merge commit, default), 'squash' (squash and merge), 'rebase' (rebase and merge)"
    default: 'merge'

runs:
  using: 'composite'
  steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
        fetch-tags: true
        token: ${{ inputs.token }}

    - name: Configure git identity
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
      run: bash "$GITHUB_ACTION_PATH/../scripts/configure-git-identity.sh" --global

    - name: Cache semantic-release
      id: cache-sr
      uses: actions/cache@v5
      with:
        path: ~/.npm-global
        key: "npm-sr-${{ runner.os }}-${{ hashFiles('*releaserc*', '**/package-lock.json', '**/package.json') }}"
        restore-keys: |
          npm-sr-${{ runner.os }}-

    - name: Install semantic-release and plugins
      if: steps.cache-sr.outputs.cache-hit != 'true'
      shell: bash
      run: |
        npm config set prefix ~/.npm-global

        # Extract plugin names from .releaserc
        PLUGINS=$(jq -r '.plugins[] | if type == "string" then . else .[0] end' .releaserc* 2>/dev/null || echo "")

        # Build the npm install command with semantic-release and all plugins
        INSTALL_CMD="npm install -g semantic-release"
        if [ -n "$PLUGINS" ]; then
          while IFS= read -r plugin; do
            [ -n "$plugin" ] && INSTALL_CMD="$INSTALL_CMD $plugin"
          done <<< "$PLUGINS"
        fi

        # Execute the install command
        eval "$INSTALL_CMD"

    - name: Add ~/.npm-global/bin to PATH
      shell: bash
      run: echo "~/.npm-global/bin" >> $GITHUB_PATH

    - name: Run semantic-release
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.token }}
      run: semantic-release

    - name: Resolve release outputs
      id: release
      shell: bash
      run: |
        git fetch --tags origin
        TAG=$(git tag --points-at HEAD --sort=-v:refname | head -1)

        if [ -n "$TAG" ]; then
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
        fi

    - name: Backmerge to develop
      if: inputs.enable-backmerge == 'true' && github.ref == format('refs/heads/{0}', inputs.source-branch)
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.token }}
        MERGE_STRATEGY: ${{ inputs.merge-strategy }}
      run: |
        if [[ "$MERGE_STRATEGY" != "merge" && "$MERGE_STRATEGY" != "squash" && "$MERGE_STRATEGY" != "rebase" ]]; then
          echo "::error::Invalid merge-strategy '$MERGE_STRATEGY'. Supported values: merge, squash, rebase"
          exit 1
        fi

        git fetch origin ${{ inputs.backmerge-target-branch }}
        git checkout ${{ inputs.backmerge-target-branch }}

        case "$MERGE_STRATEGY" in
          merge)
            git merge ${{ inputs.source-branch }} --no-ff -m "chore: backmerge ${{ inputs.source-branch }} after release"
            ;;
          squash)
            git merge ${{ inputs.source-branch }} --squash
            if git diff --cached --quiet; then
              echo "::notice::No changes to commit after squash merge — branches are already in sync"
              exit 0
            fi
            git commit -m "chore: backmerge ${{ inputs.source-branch }} after release"
            ;;
          rebase)
            git rebase ${{ inputs.source-branch }}
            ;;
        esac

        git push origin ${{ inputs.backmerge-target-branch }}
