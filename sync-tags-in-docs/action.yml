name: 'Sync Tags in Documentation'

description: 'Update GitHub action tags in documentation files to match the current version'

inputs:
  file-extensions:
    required: false
    default: '.md'
    description: 'Space-separated list of file extensions to scan (e.g., ".md .txt")'

  github-repo-path:
    required: true
    description: 'GitHub repository path (e.g., "alchemaxinc/update-deps")'

  folder:
    required: false
    default: '.'
    description: 'Folder to scan for files (defaults to repository root)'

  current-tag:
    required: true
    description: 'Current GitHub tag to update to (e.g., "v1.10.2")'

outputs:
  files_updated:
    description: 'Space-separated list of files that were updated'
    value: ${{ steps.update_tags.outputs.files_updated }}

runs:
  using: 'composite'
  steps:
    - name: Validate tag
      id: validate_tag
      shell: bash
      run: |
        TAG="${{ inputs.current-tag }}"
        echo "::debug::Validating tag: $TAG"

        if [[ ! $TAG =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "::error::Tag '$TAG' must be a full semantic version with v prefix (e.g., v1.10.2)"
          exit 1
        fi

        echo "::debug::Tag validation passed: $TAG"

    - name: Find and update tags in documentation
      id: update_tags
      shell: bash
      run: |
        EXTENSIONS="${{ inputs.file-extensions }}"
        FOLDER="${{ inputs.folder }}"
        REPO_PATH="${{ inputs.github-repo-path }}"
        NEW_TAG="${{ inputs.current-tag }}"
        FILES_UPDATED=""

        echo "::debug::Scanning folder: $FOLDER"
        echo "::debug::File extensions: $EXTENSIONS"
        echo "::debug::Repository path: $REPO_PATH"
        echo "::debug::New tag: $NEW_TAG"

        # Build find command for multiple extensions
        FIND_ARGS=""
        for ext in $EXTENSIONS; do
          if [ -n "$FIND_ARGS" ]; then
            FIND_ARGS="$FIND_ARGS -o"
          fi
          FIND_ARGS="$FIND_ARGS -name \"*$ext\""
        done

        FILES=$(eval "find \"$FOLDER\" -type f \\( $FIND_ARGS \\)" 2>/dev/null || true)

        if [ -z "$FILES" ]; then
          echo "::notice::No files found with extensions: $EXTENSIONS"
          echo "files_updated=" >> $GITHUB_OUTPUT
          exit 0
        fi

        # Escape slashes in repo path for use in sed
        ESCAPED_REPO_PATH=$(echo "$REPO_PATH" | sed 's|/|\\/|g')

        for file in $FILES; do
          if [ ! -f "$file" ]; then
            continue
          fi

          echo "::debug::Processing file: $file"

          # Match any reference like: alchemaxinc/update-deps/something@vX or @vX.Y or @vX.Y.Z
          # and replace the tag portion with the new full tag
          if ! grep -q "${REPO_PATH}[^@]*@v[0-9]" "$file"; then
            echo "::debug::No matching references in $file"
            continue
          fi

          echo "::debug::Found references in $file, updating..."

          # Replace: repo-path/any-subpath@v<anything> -> repo-path/any-subpath@NEW_TAG
          # This handles @v1, @v1.2, @v1.2.3 etc.
          sed -i.bak "s|\(${REPO_PATH}/[^@]*\)@v[0-9][0-9.]*|\1@${NEW_TAG}|g" "$file"

          # Also handle bare repo references without subpath: repo-path@v<anything>
          sed -i.bak "s|\(${REPO_PATH}\)@v[0-9][0-9.]*|\1@${NEW_TAG}|g" "$file"

          if ! cmp -s "$file" "$file.bak"; then
            echo "::notice::Updated tags in $file to $NEW_TAG"
            FILES_UPDATED="$FILES_UPDATED $file"
          fi

          rm -f "$file.bak"
        done

        # Trim leading space
        FILES_UPDATED=$(echo "$FILES_UPDATED" | sed 's/^ //')

        echo "::notice::Updated files: $FILES_UPDATED"
        echo "files_updated=$FILES_UPDATED" >> $GITHUB_OUTPUT
